Resources:
  NFCMessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: nfc-messages-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: type
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
        - AttributeName: type
          KeyType: RANGE
